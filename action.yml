name: 'Sync Project Files Action'
description: 'Detects changes in WORKLOG.md or PROJECT.md, processes them based on file-specific rules, and opens a PR.'

inputs:
  target_repo:
    description: 'The repository to create the pull request in (e.g., "owner/repo").'
    required: true
  target_branch:
    description: 'The base branch to create the pull request against.'
    required: false
    default: 'main'
  token:
    description: 'A Personal Access Token (PAT) with repo scope for the target repository.'
    required: true
  source_token:
    description: 'A token with read access to the source repository (used to fetch repo metadata). Falls back to `token` if not provided.'
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Set up Git
      shell: bash
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Fetch Repo Metadata
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.source_token != '' && inputs.source_token || inputs.token }}
        SOURCE_REPO: ${{ github.repository }}
      run: |
        echo "Fetching metadata for ${SOURCE_REPO}..."

        # --- Visibility ---
        VISIBILITY=$(gh api repos/${SOURCE_REPO} --jq '.visibility')
        if [ "$VISIBILITY" = "private" ]; then
          VISIBILITY_LABEL="Private"
        else
          VISIBILITY_LABEL="Public"
        fi

        # --- Languages (sanitize pipe chars to avoid Markdown table injection) ---
        LANGUAGES=$(gh api repos/${SOURCE_REPO}/languages --jq 'to_entries | sort_by(-.value) | .[0:5] | map(.key) | join(", ")')
        if [ -z "$LANGUAGES" ]; then
          LANGUAGES="N/A"
        fi
        LANGUAGES="${LANGUAGES//|/}"

        # --- Last Updated ---
        LAST_UPDATED=$(gh api repos/${SOURCE_REPO} --jq '.pushed_at | split("T")[0]')

        echo "REPO_VISIBILITY_LABEL=${VISIBILITY_LABEL}" >> $GITHUB_ENV
        echo "REPO_LANGUAGES=${LANGUAGES}" >> $GITHUB_ENV
        echo "REPO_LAST_UPDATED=${LAST_UPDATED}" >> $GITHUB_ENV
        echo "Metadata fetched: visibility=${VISIBILITY_LABEL}, languages=${LANGUAGES}, last_updated=${LAST_UPDATED}"

    - name: Clone Target Repository
      shell: bash
      env:
        TOKEN: ${{ inputs.token }}
        TARGET_BRANCH: ${{ inputs.target_branch }}
        TARGET_REPO: ${{ inputs.target_repo }}
      run: |
        git clone --branch "$TARGET_BRANCH" \
          "https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git" \
          target_repo_clone

    - name: Create Branch and Process Files
      shell: bash
      env:
        GH_REPOSITORY: ${{ github.repository }}
        GH_SHA: ${{ github.sha }}
      run: |
        SAFE_DEST_PATH="content"
        cd target_repo_clone

        # Sanitize repo name: allow only alphanumeric, hyphens, underscores, dots
        RAW_REPO_NAME=$(echo "$GH_REPOSITORY" | cut -d'/' -f2)
        REPO_NAME=$(echo "$RAW_REPO_NAME" | tr -cd '[:alnum:]._-')
        if [ -z "$REPO_NAME" ]; then
          echo "Error: could not derive a safe repo name from '$GH_REPOSITORY'"
          exit 1
        fi

        # Create a single branch for this update
        BRANCH_NAME="update/${REPO_NAME}-${GH_SHA}"
        git checkout -b "$BRANCH_NAME"
        echo "Created new branch: $BRANCH_NAME"

        FILES_ADDED=0

        # --- RULE 1: PROCESS PROJECT.MD (OVERWRITE) ---
        if [ -f ../PROJECT.md ]; then
            echo "Processing PROJECT.md (overwrite mode)..."
            DEST_DIR="${SAFE_DEST_PATH}/project"
            mkdir -p "$DEST_DIR"

            # The filename is now static, no suffix needed
            FINAL_FILENAME="$DEST_DIR/${REPO_NAME}-PROJECT.md"

            cp ../PROJECT.md "$FINAL_FILENAME"

            # Append repo metadata block (referenced as shell env vars, not expressions)
            cat >> "$FINAL_FILENAME" << EOF

---

## 📊 Repository Info

| Field | Value |
|---|---|
| Visibility | $REPO_VISIBILITY_LABEL |
| Languages | $REPO_LANGUAGES |
| Last updated | $REPO_LAST_UPDATED |
EOF

            echo "Copied PROJECT.md (with repo metadata) to $FINAL_FILENAME"

            FILES_ADDED=1
        fi

        # --- RULE 2: PROCESS WORKLOG.MD (OVERWRITE) ---
        if [ -f ../WORKLOG.md ]; then
            echo "Processing WORKLOG.md (overwrite mode)..."
            DEST_DIR="${SAFE_DEST_PATH}/worklog"
            mkdir -p "$DEST_DIR"

            # The filename is now static, no suffix needed
            FINAL_FILENAME="$DEST_DIR/${REPO_NAME}-WORKLOG.md"

            cp ../WORKLOG.md "$FINAL_FILENAME"
            echo "Copied WORKLOG.md to $FINAL_FILENAME"

            FILES_ADDED=1
        fi

        echo "FILES_ADDED=$FILES_ADDED" >> $GITHUB_ENV
        echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

    - name: Commit and Push Changes
      if: env.FILES_ADDED == '1'
      shell: bash
      env:
        SOURCE_REPO: ${{ github.repository }}
      run: |
        cd target_repo_clone
        git add .

        if ! git diff --staged --quiet; then
          echo "Content has changed. Committing and pushing..."
          git commit -m "feat(docs): Sync project files from ${SOURCE_REPO}"
          git push origin "$BRANCH_NAME"
        else
          echo "No net content changes detected. Skipping commit and PR."
          # Set flag to 0 so the PR step is skipped
          echo "FILES_ADDED=0" >> $GITHUB_ENV
        fi

    - name: Create Pull Request
      if: env.FILES_ADDED == '1'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        TARGET_REPO: ${{ inputs.target_repo }}
        TARGET_BRANCH: ${{ inputs.target_branch }}
        SOURCE_REPO: ${{ github.repository }}
      run: |
        gh pr create --repo "$TARGET_REPO" \
           --title "Sync project files from ${SOURCE_REPO}" \
           --body "Automated PR to sync updated project documentation." \
           --base "$TARGET_BRANCH" \
           --head "$BRANCH_NAME"
        echo "✅ Pull request created."
